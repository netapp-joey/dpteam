#!/usr/bin/env ansible-playbook
#Cheating doesn't help you learn.
- hosts: localhost
  gather_facts: false
  vars:
    input: &input
      hostname: 192.168.0.101
      username: "admin"
      password: "Netapp1!"
      https: true
      validate_certs: false
      use_rest: always
  collections:
  - netapp.ontap
  tasks:
  - name: Do thing 1
    na_ontap_command:
      command: "set d -c off;snap delete -vsever svmSrc -volume prodVol1 -snapshot snapmirror* -ignore-owners true"
      <<: *input
